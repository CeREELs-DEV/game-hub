<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Supermarket Game Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbfbf9;
    --ink:#16181a;
    --ink-soft:#6b7178;
    --line:#e4e4de;
    --g1:#7cb342;
    --g2:#f4a02a;
    --g3:#e2574c;
    --g4:#8a98a0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Inter','Noto Sans KR',system-ui,sans-serif;
    overflow:hidden;
  }

  .page{height:100vh;height:100dvh;display:flex;flex-direction:column;}

  /* ===== header ===== */
  header{
    flex:0 0 auto;
    display:flex;align-items:center;justify-content:flex-end;
    padding:0 28px;height:64px;
    border-bottom:1px solid var(--line);
  }
  .meta{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--ink-soft);display:flex;align-items:center;gap:8px;}
  .meta .dot{width:7px;height:7px;border-radius:50%;background:var(--g1);}

  /* ===== 4 vertical columns ===== */
  main{flex:1 1 auto;display:flex;min-height:0;}

  .col{
    flex:1 1 0;min-width:0;
    display:flex;flex-direction:column;
    padding:30px 26px 26px;
    text-decoration:none;color:inherit;
    border-right:1px solid var(--line);
    background:var(--bg);
    transition:background .35s ease;
    position:relative;
  }
  .col:last-child{border-right:none;}
  .col:hover{background:color-mix(in srgb, var(--accent) 6%, var(--bg));}
  .col:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;}

  /* top row: index + status */
  .col-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .idx{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);letter-spacing:.06em;}
  .status{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;
    display:flex;align-items:center;gap:6px;color:var(--ink-soft);
  }
  .status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--g1);}
  .col.soon .status::before{background:#c2c8cc;}

  /* thumbnail */
  .thumb{
    width:100%;aspect-ratio:4/3;border-radius:10px;overflow:hidden;
    background:color-mix(in srgb, var(--accent) 12%, #ffffff);
    border:1px solid color-mix(in srgb, var(--accent) 24%, var(--line));
    display:flex;align-items:center;justify-content:center;
    margin-bottom:24px;flex:0 0 auto;
    transition:transform .35s ease, box-shadow .35s ease;
  }
  .col:hover .thumb{transform:translateY(-4px);box-shadow:0 14px 28px -14px color-mix(in srgb, var(--accent) 45%, rgba(0,0,0,.25));}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb svg{width:62%;height:62%;}
  .col.soon .thumb{border-style:dashed;background:#f3f4f2;position:relative;}
  /* coming soon: 썸네일 비활성화 처리 */
  .col.soon .thumb img{filter:grayscale(.9) contrast(.92) brightness(1.05);opacity:.45;}
  .col.soon .thumb::after{
    content:'COMING SOON';
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;font-weight:500;
    color:#6b7178;background:rgba(255,255,255,.94);
    border:1px solid #c2c8cc;border-radius:999px;padding:8px 16px;
    white-space:nowrap;
  }
  .col.soon:hover{background:var(--bg);}
  .col.soon:hover .thumb{transform:none;box-shadow:none;}
  .col.soon .title,.col.soon .desc{opacity:.55;}

  /* title block */
  .title{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:clamp(20px,2.1vw,30px);
    line-height:1.15;letter-spacing:.02em;text-transform:uppercase;margin-bottom:12px;
  }
  .desc{font-size:13px;line-height:1.65;color:var(--ink-soft);}

  /* bottom cta */
  .cta{
    margin-top:auto;padding-top:22px;
    display:flex;align-items:center;gap:10px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;font-weight:500;
    color:var(--ink);
  }
  .cta .arrow{transition:transform .3s ease;color:var(--accent);}
  .col:hover .cta .arrow{transform:translateX(6px);}
  .cta .bar{flex:1;height:1px;background:var(--line);}
  .col.soon .cta{color:var(--ink-soft);}

  /* accent assignment */
  .c1{--accent:var(--g1);}
  .c-conn{--accent:#54a87c;}
  .c2{--accent:var(--g2);}
  .c3{--accent:var(--g3);}
  .c4{--accent:var(--g4);}

  /* ===== mobile: stack & allow scroll ===== */
  @media (max-width:760px){
    body{overflow:auto;}
    .page{height:auto;}
    main{flex-direction:column;}
    .col{border-right:none;border-bottom:1px solid var(--line);padding:26px 22px;}
    .cta{padding-top:18px;}
    .thumb{max-height:46vh;}
  }
</style>
</head>
